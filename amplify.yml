version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - echo "No frontend build step required"
  artifacts:
    baseDirectory: .
    files:
      - index.html
      - favicon.svg
      - scripts/**/*
      - styles/**/*
  cache:
    paths:
      - .npm/**/*
